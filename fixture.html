<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Fixtures</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
}

header{
    text-align:center;
    padding:30px 15px;
    font-size:34px;
    font-weight:bold;
    letter-spacing:1px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:18px;
}

.match{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    transition:0.25s;
}

.match:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.13);
}

.team-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
    width:42%;
    font-size:18px;
    font-weight:bold;
}

.flag{
    font-size:28px;
}

.vs{
    width:16%;
    text-align:center;
    font-size:16px;
    font-weight:bold;
    color:#facc15;
}

footer{
    text-align:center;
    padding:30px;
    color:#cbd5e1;
    font-size:14px;
}
</style>
</head>
<body>

<header>🏆 World Cup Fixtures</header>

<div class="container">
<div class="grid" id="fixturesGrid"></div>
</div>

<footer>MatchAI Pro Fixture Page</footer>
