<!DOCTYPE html>
<html>
<head>
<title>Login - MatchAI Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef2ff,#ede9fe);
text-align:center;
}

.box{
margin-top:120px;
background:white;
display:inline-block;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

input{
display:block;
width:300px;
padding:15px;
margin:10px auto;
font-size:18px;
border-radius:10px;
border:2px solid #ddd;
}

button{
padding:15px 40px;
font-size:18px;
font-weight:800;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
margin-top:10px;
}

h1{
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="box">
<h1>Login</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDm-tChOkLa0T26khkWVX_yWCa6cKaML7Q",
  authDomain: "matchaipro-accc8.firebaseapp.com",
  projectId: "matchaipro-accc8",
  storageBucket: "matchaipro-accc8.firebasestorage.app",
  messagingSenderId: "811643864855",
  appId: "1:811643864855:web:397384d327bef1ef9f9952"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const STRIPE_URL = "https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";

// LOGIN
document.getElementById("loginBtn").onclick = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const res = await auth.signInWithEmailAndPassword(email,password);
    const user = res.user;

    const snap = await db.collection("users").doc(user.uid).get();
    const data = snap.data();

    if(data && data.paid === true){
      window.location.href = "index.html";
    } else {
      window.location.href = STRIPE_URL;
    }

  }catch(e){
    alert("Login error: " + e.message);
  }
};


// SIGN UP
document.getElementById("signupBtn").onclick = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const res = await auth.createUserWithEmailAndPassword(email,password);
    const user = res.user;

    await db.collection("users").doc(user.uid).set({
      email: email,
      uses: 0,
      paid: false
    });

    // Yeni kullanıcı direkt ödeme sayfasına
    window.location.href = STRIPE_URL;

  }catch(e){
    alert("Signup error: " + e.message);
  }
};

</script>

</body>
</html>
