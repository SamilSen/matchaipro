<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.input-box{
padding:12px;
font-size:16px;
margin:8px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#app{display:none}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="authBox">
  <h2>MatchAI Login</h2>

  <input id="email" class="input-box" placeholder="Email"><br>
  <input id="password" class="input-box" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
</div>

<!-- ⚽ APP (SENİN SİSTEMİN) -->
<div id="app">

  <h1>MatchAI Pro</h1>

  <input id="team1" class="input-box" placeholder="Home Team">
  <input id="team2" class="input-box" placeholder="Away Team">

  <br>

  <button onclick="predict()">PREDICT</button>

  <div id="result"></div>

</div>

<!-- 🔥 FIREBASE (SAFE ADDON) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* 🔐 LOGIN */
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await signInWithEmailAndPassword(auth,email,pass);
  currentUser = res.user;

  checkPremium(currentUser.uid);
};

/* 💳 PREMIUM CHECK */
async function checkPremium(uid){
  const snap = await getDoc(doc(db,"users",uid));

  if(snap.exists() && snap.data().paid === true){

    document.getElementById("authBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    alert("Premium Active");

  } else {
    alert("Not Premium - Redirecting...");
    window.location.href =
    "https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";
  }
}

/* ⚽ SENİN PREDICTION KODUN (DEĞİŞMEDİ) */
window.predict = function(){
  const t1 = document.getElementById("team1").value;
  const t2 = document.getElementById("team2").value;

  document.getElementById("result").innerHTML =
    "<h2>" + t1 + " vs " + t2 + "</h2><p>Prediction running...</p>";
};

</script>

</body>
</html>
