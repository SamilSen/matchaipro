<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;

}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

#status{
margin-top:23px;
font-size:25px;
font-weight:800;
}

/* CARD */
.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
border-radius:24px;
background:rgba(255,255,255,.62);
backdrop-filter:blur(12px);
box-shadow:0 18px 40px rgba(0,0,0,.16);
}

/* HEARTBEAT TEXT */
@keyframes heartbeatText {
0% { transform: scale(1); }
25% { transform: scale(1.08); }
50% { transform: scale(1); }
75% { transform: scale(1.12); }
100% { transform: scale(1); }
}

.heartbeat-text{
display:inline-block;
font-weight:900;
color:#7c3aed;
animation:heartbeatText 1.2s infinite;
}

/* TEK SATIR */
.card h2{
font-size:32px;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
white-space:nowrap;
}

.team{
display:flex;
align-items:center;
gap:8px;
white-space:nowrap;
}

.flag{
width:40px;
height:28px;
border-radius:4px;
}

@keyframes heartbeat {
0% { transform: scale(1); }
25% { transform: scale(1.08); }
50% { transform: scale(1); }
75% { transform: scale(1.12); }
100% { transform: scale(1); }
}

.card h3{
font-size:41px;
margin:18px 0 26px;
color:#7c3aed;
font-weight:900;
animation:heartbeat 1s infinite;
}

.bar-bg{
height:24px;
background:#e5e7eb;
border-radius:14px;
overflow:hidden;
margin-bottom:18px;
}

.bar{height:24px;width:0;border-radius:14px;transition:width 1.2s ease;}
.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

.footer{
margin-top:46px;
padding:26px;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:center;
gap:12px;
}

.footer a{
padding:16px 34px;
font-size:24px;
font-weight:900;
color:#7c3aed;
text-decoration:none;
border-radius:14px;
background:#fff;
border:2px solid #000;
}

.copy{
margin-top:20px;
padding-bottom:30px;
font-size:22px;
font-weight:900;
color:black;
}
</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">
<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">
<br>
<button class="predict-btn" onclick="predict()">PREDICT</button>
</div>

<div id="status">Loading...</div>

<!-- ✅ READY SCREEN (bozulmaz, mobil safe) -->
<div id="result">
  <div class="card">

    <h2>⚽ Ready For Prediction</h2>

    <p style="font-size:34px;font-weight:800;color:#6b7280;">
      <span class="heartbeat-text">Enter Teams Above</span>
    </p>

    <p>Home (0%)</p>
    <div class="bar-bg"><div class="bar home" style="width:0%"></div></div>

    <p>Draw (0%)</p>
    <div class="bar-bg"><div class="bar draw" style="width:0%"></div></div>

    <p>Away (0%)</p>
    <div class="bar-bg"><div class="bar away" style="width:0%"></div></div>

  </div>
</div>

<div class="footer">
<a href="legal.html">Legal Disclaimer</a>
<a href="price.html">Price Policy</a>
<a href="about.html">About & Contact</a>
</div>

<div class="copy">
© 2026  MatchAI Pro. All Rights Reserved.
</div>

<script>

let data = [];

function normalizeText(str){
return str
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/’/g,"'")
.toLowerCase()
.trim();
}

function fixCode(team){
const map = {
"Mexico":"mx","South Africa":"za","Korea Republic":"kr","Czechia":"cz",
"Canada":"ca","Bosnia-Herzegovina":"ba","USA":"us","Paraguay":"py",
"Qatar":"qa","Switzerland":"ch","Brazil":"br","Morocco":"ma",
"Haiti":"ht","Scotland":"gb","Australia":"au","Turkey":"tr",
"Germany":"de","Curaçao":"cw","Netherlands":"nl","Japan":"jp",
"Côte d'Ivoire":"ci","Ecuador":"ec","Sweden":"se","Tunisia":"tn",
"Spain":"es","Belgium":"be","Egypt":"eg","Saudi Arabia":"sa",
"Uruguay":"uy","Iran":"ir","New Zealand":"nz","France":"fr",
"Senegal":"sn","Iraq":"iq","Norway":"no","Argentina":"ar",
"Algeria":"dz","Austria":"at","Jordan":"jo","Portugal":"pt",
"Congo DR":"cd","England":"gb","Croatia":"hr","Ghana":"gh",
"Panama":"pa","Uzbekistan":"uz","Colombia":"co"
};
return map[team] || "";
}

fetch("https://raw.githubusercontent.com/SamilSen/matchaipro/main/predictions.csv")
.then(r=>r.text())
.then(t=>{

const rows = t.split(/\r?\n/).slice(1).filter(r=>r.trim());

data = rows.map(r=>{
const c = r.split(",");

return {
t1:c[0].trim(),
t2:c[1].trim(),
code1:fixCode(c[0].trim()),
code2:fixCode(c[1].trim()),
h:parseFloat(c[4]),
d:parseFloat(c[5]),
a:parseFloat(c[6])
};
});

document.getElementById("status").innerHTML="✅ Ready";
});

function flag(code){
return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

function predict(){

const t1 = document.getElementById("team1").value.trim();
const t2 = document.getElementById("team2").value.trim();

const m = data.find(x =>
normalizeText(x.t1) === normalizeText(t1) &&
normalizeText(x.t2) === normalizeText(t2)
);

if(!m){
document.getElementById("result").innerHTML=
"<div class='card'>❌ Match Not Found</div>";
return;
}

let pred = "";

if(m.h > m.d && m.h > m.a){
pred = m.t1 + " Win";
}
else if(m.a > m.h && m.a > m.d){
pred = m.t2 + " Win";
}
else{
pred = "Draw";
}

document.getElementById("result").innerHTML = `
<div class="card">

<h2>
<span class="team">${flag(m.code1)} ${m.t1}</span>
<span>VS</span>
<span class="team">${m.t2} ${flag(m.code2)}</span>
</h2>

<h3>${pred}</h3>

<p>Home (${m.h}%)</p>
<div class="bar-bg"><div id="b1" class="bar home"></div></div>

<p>Draw (${m.d}%)</p>
<div class="bar-bg"><div id="b2" class="bar draw"></div></div>

<p>Away (${m.a}%)</p>
<div class="bar-bg"><div id="b3" class="bar away"></div></div>

</div>
`;

setTimeout(()=>{
document.getElementById("b1").style.width = m.h + "%";
document.getElementById("b2").style.width = m.d + "%";
document.getElementById("b3").style.width = m.a + "%";
},120);

}

<script>

/* =========================
   STRIPE
========================= */
const STRIPE_499 = "https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";

/* =========================
   FREE LIMIT
========================= */
let freeCount = parseInt(localStorage.getItem("freeCount")) || 0;

/* =========================
   OVERRIDE YOUR EXISTING PREDICT
========================= */
const originalPredict = predict;

/* =========================
   NEW CONTROLLED PREDICT
========================= */
predict = function(){

if(freeCount >= 3){

return;
}

freeCount++;
localStorage.setItem("freeCount", freeCount);

// eski sistem çalışsın
originalPredict();
}

/* =========================

<div class="card">

<button onclick="buyPro()" style="

background:#3b82f6;
color:white;
border:none;
border-radius:12px;
cursor:pointer;">
$4.99 Unlock Pro
</button>

</div>
`;

/* =========================

}

</script>
</body>
</html>
