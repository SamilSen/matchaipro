<script>
const firebaseConfig = {
  apiKey: "AIzaSyDm-tChOkLa0T26khkWVX_yWCa6cKaML7Q",
  authDomain: "matchaipro-accc8.firebaseapp.com",
  projectId: "matchaipro-accc8",
  storageBucket: "matchaipro-accc8.firebasestorage.app",
  messagingSenderId: "811643864855",
  appId: "1:811643864855:web:397384d327bef1ef9f9952"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const STRIPE_URL = "https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";
const MAX_FREE_USES = 3;

let currentUser = null;
let userData = null;
let matchData = [];

function showAuthMessage(message){
  const el = document.getElementById("authMessage");
  if(el){
    el.textContent = message;
  }
}

window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    showAuthMessage("Please enter email and password.");
    return;
  }

  try{
    await auth.signInWithEmailAndPassword(email, password);
    showAuthMessage("Login successful.");
  }catch(error){
    showAuthMessage("Login error: " + error.message);
  }
};

window.signUp = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!emailRegex.test(email)){
    showAuthMessage("Please enter a valid email address.");
    return;
  }

  if(password.length < 6){
    showAuthMessage("Password must be at least 6 characters.");
    return;
  }

  try{
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    const user = userCredential.user;

    await db.collection("users").doc(user.uid).set({
      email: email,
      uses: 0,
      paid: false
    }, { merge: true });

    showAuthMessage("Account created successfully.");
  }catch(error){
    showAuthMessage("Signup error: " + error.message);
  }
};

const urlParams = new URLSearchParams(window.location.search);

if(urlParams.get("success") === "true"){
  auth.onAuthStateChanged(async user => {
    if(user){
      await db.collection("users").doc(user.uid).set({
        paid: true,
        email: user.email
      }, { merge: true });

      localStorage.setItem("paid","true");
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  });
}

auth.onAuthStateChanged(async user => {
  currentUser = user;

  if(user){
    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();

    if(!snap.exists){
      await ref.set({
        email: user.email,
        uses: 0,
        paid: false
      });

      userData = {
        email: user.email,
        uses: 0,
        paid: false
      };
    } else {
      userData = snap.data();

      if(typeof userData.uses === "undefined"){
        userData.uses = 0;
      }

      if(typeof userData.paid === "undefined"){
        userData.paid = false;
      }
    }

    document.getElementById("userBar").style.display = "flex";
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("authBox").style.display = "none";

  } else {
    userData = null;
    document.getElementById("userBar").style.display = "none";
    document.getElementById("authBox").style.display = "block";
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await auth.signOut();
  window.location.reload();
});

function fixCode(team){
  const map = {
    "Mexico":"mx",
    "South Africa":"za",
    "Korea Republic":"kr",
    "Czechia":"cz",
    "Canada":"ca",
    "Bosnia-Herzegovina":"ba",
    "USA":"us",
    "United States":"us",
    "Paraguay":"py",
    "Qatar":"qa",
    "Switzerland":"ch",
    "Brazil":"br",
    "Morocco":"ma",
    "Haiti":"ht",
    "Scotland":"gb",
    "Australia":"au",
    "Turkey":"tr",
    "Türkiye":"tr",
    "Germany":"de",
    "Curaçao":"cw",
    "Curacao":"cw",
    "Netherlands":"nl",
    "Japan":"jp",
    "Côte d'Ivoire":"ci",
    "Cote d'Ivoire":"ci",
    "Ecuador":"ec",
    "Sweden":"se",
    "Tunisia":"tn",
    "Spain":"es",
    "Belgium":"be",
    "Egypt":"eg",
    "Saudi Arabia":"sa",
    "Uruguay":"uy",
    "Iran":"ir",
    "New Zealand":"nz",
    "France":"fr",
    "Senegal":"sn",
    "Iraq":"iq",
    "Norway":"no",
    "Argentina":"ar",
    "Algeria":"dz",
    "Austria":"at",
    "Jordan":"jo",
    "Portugal":"pt",
    "Congo DR":"cd",
    "England":"gb",
    "Croatia":"hr",
    "Ghana":"gh",
    "Panama":"pa",
    "Uzbekistan":"uz",
    "Colombia":"co"
  };

  return map[team] || "";
}

function normalizeText(str){
  return String(str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[’‘]/g,"'")
    .replace(/[^a-zA-Z0-9 ]/g,"")
    .toLowerCase()
    .trim()
    .replace(/\s+/g," ");
}

function fixTeamName(name){
  const n = normalizeText(name);

  const map = {
    "usa":"united states",
    "us":"united states",
    "united states":"united states",
    "america":"united states",

    "turkey":"turkiye",
    "turkiye":"turkiye",
    "türkiye":"turkiye",

    "south korea":"korea republic",
    "korea":"korea republic",
    "korea republic":"korea republic",

    "ivory coast":"cote divoire",
    "cote divoire":"cote divoire",
    "cote d ivoire":"cote divoire",

    "curacao":"curacao",
    "curaçao":"curacao",

    "bosnia":"bosnia herzegovina",
    "bosnia herzegovina":"bosnia herzegovina",
    "bosnia-herzegovina":"bosnia herzegovina",

    "dr congo":"congo dr",
    "congo":"congo dr",
    "congo dr":"congo dr",

    "czech republic":"czechia",
    "czechia":"czechia"
  };

  return map[n] || n;
}

function parseCSVLine(line){
  const result = [];
  let current = "";
  let insideQuotes = false;

  for(let i = 0; i < line.length; i++){
    const char = line[i];

    if(char === '"'){
      insideQuotes = !insideQuotes;
    } else if(char === "," && !insideQuotes){
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

fetch("https://raw.githubusercontent.com/SamilSen/matchaipro/main/predictions.csv")
  .then(response => {
    if(!response.ok){
      throw new Error("CSV not loaded");
    }
    return response.text();
  })
  .then(text => {
    const rows = text.split(/\r?\n/).slice(1).filter(row => row.trim());

    matchData = rows.map(row => {
      const c = parseCSVLine(row);

      if(c.length < 7) return null;

      const home = c[0].trim();
      const away = c[1].trim();

      const h = parseFloat(c[4]);
      const d = parseFloat(c[5]);
      const a = parseFloat(c[6]);

      if(!home || !away || isNaN(h) || isNaN(d) || isNaN(a)){
        return null;
      }

      return {
        t1: home,
        t2: away,
        search1: fixTeamName(home),
        search2: fixTeamName(away),
        code1: fixCode(home),
        code2: fixCode(away),
        h: h,
        d: d,
        a: a
      };
    }).filter(item => item !== null);

    if(matchData.length > 0){
      document.getElementById("status").innerHTML = "✅ Ready";
    } else {
      document.getElementById("status").innerHTML = "❌ No prediction data found";
    }
  })
  .catch(error => {
    console.error(error);
    document.getElementById("status").innerHTML = "❌ Data load failed";
  });

function showResult(m){
  let pred = "";

  if(m.h > m.d && m.h > m.a){
    pred = m.t1 + " Win";
  } else if(m.a > m.h && m.a > m.d){
    pred = m.t2 + " Win";
  } else {
    pred = "Draw";
  }

  const flag1 = m.code1 ? `<img class="flag" src="https://flagcdn.com/w40/${m.code1}.png">` : "";
  const flag2 = m.code2 ? `<img class="flag" src="https://flagcdn.com/w40/${m.code2}.png">` : "";

  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>${flag1} ${m.t1} VS ${m.t2} ${flag2}</h2>
      <h3>${pred}</h3>

      <p>Home (${m.h}%)</p>
      <div class="bar-bg"><div id="b1" class="bar home"></div></div>

      <p>Draw (${m.d}%)</p>
      <div class="bar-bg"><div id="b2" class="bar draw"></div></div>

      <p>Away (${m.a}%)</p>
      <div class="bar-bg"><div id="b3" class="bar away"></div></div>
    </div>
  `;

  setTimeout(() => {
    document.getElementById("b1").style.width = m.h + "%";
    document.getElementById("b2").style.width = m.d + "%";
    document.getElementById("b3").style.width = m.a + "%";
  }, 120);
}

document.getElementById("predictBtn").addEventListener("click", async () => {
  const t1 = document.getElementById("team1").value.trim();
  const t2 = document.getElementById("team2").value.trim();

  if(!t1 || !t2){
    document.getElementById("result").innerHTML =
      "<div class='card'>⚠️ Please enter both teams</div>";
    return;
  }

  if(matchData.length === 0){
    document.getElementById("result").innerHTML =
      "<div class='card'>❌ Prediction data not loaded.<br><br>Check predictions.csv file.</div>";
    return;
  }

  const nt1 = fixTeamName(t1);
  const nt2 = fixTeamName(t2);

  const match = matchData.find(x =>
    x.search1 === nt1 &&
    x.search2 === nt2
  ) || matchData.find(x =>
    x.search1.includes(nt1) &&
    x.search2.includes(nt2)
  ) || matchData.find(x =>
    nt1.includes(x.search1) &&
    nt2.includes(x.search2)
  );

  if(!match){
    document.getElementById("result").innerHTML =
      "<div class='card'>❌ Match Not Found<br><br>Please copy team names from Fixture exactly.</div>";
    return;
  }

  if(!currentUser){
    const freeUses = parseInt(localStorage.getItem("free_uses") || "0");

    if(freeUses >= MAX_FREE_USES){
      document.getElementById("result").innerHTML =
        "<div class='card'>🔐 Please login or create an account to continue.</div>";
      document.getElementById("authBox").scrollIntoView({ behavior: "smooth" });
      return;
    }

    localStorage.setItem("free_uses", freeUses + 1);
    showResult(match);
    return;
  }

  if(userData && userData.paid === true){
    showResult(match);
    return;
  }

  if(userData && userData.paid !== true){
    window.location.href = STRIPE_URL;
    return;
  }
});
</script>
