<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

/* ===== PREMIUM BAR ===== */
.pay-top{
position:sticky;
top:0;
z-index:999;
background:linear-gradient(90deg,#111827,#1f2937);
color:white;
padding:12px;
font-weight:900;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.pay-top button{
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:900;
background:#22c55e;
color:white;
}

/* ===== OVERLAY ===== */
#payBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
display:none;
z-index:9999;
}

.pay-inner{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px 25px;
border-radius:18px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.3);
}

/* ===== ORIGINAL DESIGN ===== */

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;
outline:none;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

#status{
margin-top:23px;
font-size:25px;
font-weight:800;
}

.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
border-radius:24px;
background:rgba(255,255,255,.62);
backdrop-filter:blur(12px);
box-shadow:0 18px 40px rgba(0,0,0,.16);
}

.bar-bg{
height:24px;
background:#e5e7eb;
border-radius:14px;
overflow:hidden;
margin-bottom:18px;
}

.bar{height:24px;width:0;border-radius:14px;transition:width 1.2s ease;}
.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

.footer{
margin-top:46px;
padding:26px;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:center;
gap:12px;
}

.footer a{
padding:16px 34px;
font-size:24px;
font-weight:900;
color:#7c3aed;
text-decoration:none;
border-radius:14px;
background:#fff;
border:2px solid #000;
}

.copy{
margin-top:20px;
padding-bottom:30px;
font-size:22px;
font-weight:900;
color:black;
}
</style>
</head>

<body>

<!-- PREMIUM BAR -->
<div class="pay-top">
⚡ Free Usage: <span id="freeCount">0/3</span>
<button onclick="buyNow()">Unlock Full Access - $4.99</button>
</div>

<!-- OVERLAY -->
<div id="payBox">
  <div class="pay-inner">
    <h2>🔒 Limit Reached</h2>
    <p>You used all free predictions</p>
    <button class="predict-btn" onclick="buyNow()">Unlock - $4.99</button>
  </div>
</div>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">
<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">
<br>
<button class="predict-btn" onclick="predict()">PREDICT</button>
</div>

<div id="status">Loading...</div>

<div id="result"></div>

<div class="footer">
<a href="legal.html">Legal Disclaimer</a>
<a href="price.html">Price Policy</a>
<a href="about.html">About & Contact</a>
</div>

<div class="copy">
© 2026 MatchAI Pro. All Rights Reserved.
</div>

<script>

let data = [];
let freeLimit = 3;

if(!localStorage.getItem("freeCount")){
localStorage.setItem("freeCount","0");
}

function updateUI(){
document.getElementById("freeCount").innerText =
localStorage.getItem("freeCount") + "/3";
}

function isPaid(){
return localStorage.getItem("paid") === "true";
}

function increment(){
let c = parseInt(localStorage.getItem("freeCount") || "0");
c++;
localStorage.setItem("freeCount", c);
updateUI();
return c;
}

function checkAccess(){
if(isPaid()) return true;

let used = parseInt(localStorage.getItem("freeCount") || "0");

if(used >= freeLimit){
document.getElementById("payBox").style.display="block";
return false;
}

return true;
}

function buyNow(){
window.location.href =
"https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";
}

if(window.location.href.includes("success")){
localStorage.setItem("paid","true");
}

updateUI();

/* ===== YOUR ORIGINAL LOGIC ===== */

function normalizeText(str){
return str.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/’/g,"'")
.toLowerCase()
.trim();
}

function fixCode(team){
const map = {
"Mexico":"mx","South Africa":"za","Korea Republic":"kr","Czechia":"cz",
"Canada":"ca","Bosnia-Herzegovina":"ba","USA":"us","Paraguay":"py",
"Qatar":"qa","Switzerland":"ch","Brazil":"br","Morocco":"ma",
"Haiti":"ht","Scotland":"gb","Australia":"au","Turkey":"tr",
"Germany":"de","Curaçao":"cw","Netherlands":"nl","Japan":"jp",
"Côte d'Ivoire":"ci","Ecuador":"ec","Sweden":"se","Tunisia":"tn",
"Spain":"es","Belgium":"be","Egypt":"eg","Saudi Arabia":"sa",
"Uruguay":"uy","Iran":"ir","New Zealand":"nz","France":"fr",
"Senegal":"sn","Iraq":"iq","Norway":"no","Argentina":"ar",
"Algeria":"dz","Austria":"at","Jordan":"jo","Portugal":"pt",
"Congo DR":"cd","England":"gb","Croatia":"hr","Ghana":"gh",
"Panama":"pa","Uzbekistan":"uz","Colombia":"co"
};
return map[team] || "";
}

fetch("https://raw.githubusercontent.com/SamilSen/matchaipro/main/predictions.csv")
.then(r=>r.text())
.then(t=>{

const rows = t.split(/\r?\n/).slice(1).filter(r=>r.trim());

data = rows.map(r=>{
const c = r.split(",");
return {
t1:c[0].trim(),
t2:c[1].trim(),
code1:fixCode(c[0].trim()),
code2:fixCode(c[1].trim()),
h:parseFloat(c[4]),
d:parseFloat(c[5]),
a:parseFloat(c[6])
};
});

document.getElementById("status").innerHTML="✅ Ready";

});

function predict(){

if(!checkAccess()) return;

const t1 = document.getElementById("team1").value.trim();
const t2 = document.getElementById("team2").value.trim();

const m = data.find(x =>
normalizeText(x.t1) === normalizeText(t1) &&
normalizeText(x.t2) === normalizeText(t2)
);

if(!m){
document.getElementById("result").innerHTML=
"<div class='card'>❌ Match Not Found</div>";
return;
}

if(!isPaid()){
let used = increment();
if(used > freeLimit){
checkAccess();
return;
}
}

let pred = "";

if(m.h > m.d && m.h > m.a){
pred = m.t1 + " Win";
}
else if(m.a > m.h && m.a > m.d){
pred = m.t2 + " Win";
}
else{
pred = "Draw";
}

document.getElementById("result").innerHTML = `
<div class="card">

<h2>${m.t1} VS ${m.t2}</h2>
<h3>${pred}</h3>

<p>Home (${m.h}%)</p>
<div class="bar-bg"><div class="bar home" style="width:${m.h}%"></div></div>

<p>Draw (${m.d}%)</p>
<div class="bar-bg"><div class="bar draw" style="width:${m.d}%"></div></div>

<p>Away (${m.a}%)</p>
<div class="bar-bg"><div class="bar away" style="width:${m.a}%"></div></div>

</div>
`;

}

</script>

</body>
</html>
