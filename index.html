<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92%;
max-width:980px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:30px;
}

.title{
font-size:60px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:44px;
font-weight:800;
margin-top:10px;
color:#7c3aed;
}

.input-box{
width:320px;
padding:22px;
margin:10px;
font-size:28px;
border-radius:12px;
border:2px solid #d1d5db;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

button{
margin-top:20px;
padding:22px 55px;
font-size:30px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
color:white;
background:#e11d48;
}

.card{
margin-top:30px;
display:inline-block;
width:600px;
padding:40px;
border-radius:20px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.flag{
width:45px;
height:30px;
margin:0 6px;
vertical-align:middle;
}

.bar-bg{
height:18px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.bar{
height:18px;
width:0%;
transition:width 1s ease;
}

.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

#status{
margin-top:15px;
font-weight:800;
}
</style>
</head>

<body>

<div class="hero">
<img class="logo" src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png">

<div class="title">MatchAI Pro</div>
<div class="subtitle">World Cup Prediction Engine</div>
</div>

<input id="team1" class="input-box" placeholder="Home Team">
<input id="team2" class="input-box" placeholder="Away Team">
<br>
<button onclick="predict()">PREDICT</button>

<div id="status">Loading...</div>
<div id="result"></div>

<script>

let data=[];

/* =========================
   CSV LOADER (STRICT FORMAT)
========================= */
fetch("https://raw.githubusercontent.com/MatchAIPro/matchai/main/predictions.csv")
.then(r=>r.text())
.then(t=>{

const rows = t.trim().split("\n").slice(1);

data = rows.map(r=>{
const c = r.split(",").map(x=>x.trim());

return {
t1:c[0],
t2:c[1],
code1:c[2],
code2:c[3],
h:parseFloat(c[4]),
d:parseFloat(c[5]),
a:parseFloat(c[6])
};
});

document.getElementById("status") =
"Ready ✔ ("+data.length+" matches)";
});

/* FLAGS */
function flag(code){
return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

/* FIND MATCH (BOTH DIRECTIONS) */
function findMatch(t1,t2){

t1=t1.toLowerCase().trim();
t2=t2.toLowerCase().trim();

return data.find(x =>
(x.t1.toLowerCase()==t1 && x.t2.toLowerCase()==t2) ||
(x.t1.toLowerCase()==t2 && x.t2.toLowerCase()==t1)
);
}

/* PREDICT */
function predict(){

const t1 = team1.value;
const t2 = team2.value;

const m = findMatch(t1,t2);

if(!m){
result.innerHTML = "<h2>Match Not Found</h2>";
return;
}

let pred,w1="",w2="";

if(m.h>m.d && m.h>m.a){
pred=m.t1+" Win";
w1="gold";
}
else if(m.a>m.h && m.a>m.d){
pred=m.t2+" Win";
w2="gold";
}
else{
pred="Draw";
}

result.innerHTML=`
<div class="card">

<h2>
${flag(m.code1)} ${m.t1}
vs
${m.t2} ${flag(m.code2)}
</h2>

<h3>${pred}</h3>

<p>Home ${(m.h*100).toFixed(0)}%</p>
<div class="bar-bg"><div id="b1" class="bar home"></div></div>

<p>Draw ${(m.d*100).toFixed(0)}%</p>
<div class="bar-bg"><div id="b2" class="bar draw"></div></div>

<p>Away ${(m.a*100).toFixed(0)}%</p>
<div class="bar-bg"><div id="b3" class="bar away"></div></div>

</div>
`;

setTimeout(()=>{
b1.style.width=(m.h*100)+"%";
b2.style.width=(m.d*100)+"%";
b3.style.width=(m.a*100)+"%";
},100);
}

</script>

</body>
</html>
