<!DOCTYPE html>

<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;

border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);

}

.title{
font-size:64px;
font-weight:900;

.subtitle{

font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;

}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.fixture-btn{

padding:22px 55px;
font-size:30px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#2563eb,#3b82f6,#2563eb);
background-size:200% 200%;
box-shadow:0 0 18px rgba(37,99,235,.45);
text-decoration:none;
display:inline-block;
}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

.login-btn{
margin-top:20px;
padding:18px 40px;
font-size:24px;
font-weight:900;
border:none;
border-radius:12px;
cursor:pointer;
background:#111827;
color:white;
}

#status,#result{
margin-top:20px;
font-size:24px;
font-weight:800;
}

</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">

<a href="fixture.html" class="fixture-btn">🏆 FIXTURE</a>

<br><br>

<!-- 🔐 LOGIN -->
<button class="login-btn" onclick="login()">🔐 Login with Google</button>

<br><br>

<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">

<br>

<button class="predict-btn" onclick="predict()">PREDICT</button>

</div>

<div id="status"></div>
<div id="result"></div>

<script>
let data = [];

function predict(){

let t1 = document.getElementById("team1").value;
let t2 = document.getElementById("team2").value;

if(!t1 || !t2){
document.getElementById("status").innerHTML = "❌ Enter teams first";
return;
}

document.getElementById("status").innerHTML = "⏳ Loading...";
document.getElementById("result").innerHTML = "";

setTimeout(() => {

let score1 = Math.floor(Math.random()*4);
let score2 = Math.floor(Math.random()*4);

document.getElementById("status").innerHTML = "✅ Prediction Ready";

document.getElementById("result").innerHTML =
"🏆 " + t1 + " " + score1 + " - " + score2 + " " + t2;

}, 1500);
}

</script>
