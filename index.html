<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:40px 20px 10px;}

.logo{
width:92%;
max-width:950px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:25px;
}

.title{
font-size:60px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:42px;
font-weight:800;
color:#2563eb;
}

.trust{
font-size:20px;
font-weight:700;
color:#374151;
margin-top:10px;
}

.input-box{
width:300px;
padding:20px;
margin:10px;
font-size:24px;
border-radius:12px;
border:2px solid #ddd;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.btn{
padding:20px 55px;
font-size:26px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#e11d48,#f43f5e);
}

.card{
margin:30px auto;
width:600px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.65);
backdrop-filter:blur(10px);
box-shadow:0 18px 40px rgba(0,0,0,.15);
}

.card h3{
font-size:38px;
color:#7c3aed;
font-weight:900;
}

.bar-bg{
height:18px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.bar{
height:100%;
width:0;
transition:1s;
}

.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

.flag{
width:35px;
height:24px;
border-radius:4px;
}

.footer{
margin-top:40px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.footer a{
padding:12px 20px;
border-radius:10px;
text-decoration:none;
font-weight:900;
color:#7c3aed;
border:2px solid #000;
background:#fff;
}

/* ✅ MOBILE FIX (BOZULMAYACAK) */
@media (max-width:768px){

.input-box{
width:85%;
font-size:20px;
}

.card{
width:92%;
padding:20px;
}

.title{
font-size:38px;
}

.subtitle{
font-size:26px;
}

.btn{
width:85%;
font-size:22px;
padding:18px;
}
}

</style>
</head>

<body>

<div class="hero">
<img class="logo" src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div>
<input id="team1" class="input-box" placeholder="Home Team">
<input id="team2" class="input-box" placeholder="Away Team">
<br>
<button class="btn" onclick="predict()">PREDICT</button>
</div>

<div id="status">Loading...</div>

<!-- ✅ BOŞ AMA TASARIMLI BAŞLANGIÇ PANELİ -->
<div id="result">
<div class="card">

<h2>⚽ Ready For Prediction</h2>
<h3>Enter Teams Above</h3>

<p>Home (0%)</p>
<div class="bar-bg"><div class="bar home"></div></div>

<p>Draw (0%)</p>
<div class="bar-bg"><div class="bar draw"></div></div>

<p>Away (0%)</p>
<div class="bar-bg"><div class="bar away"></div></div>

</div>
</div>

<div class="footer">
<a href="legal.html">Legal</a>
<a href="price.html">Price</a>
<a href="about.html">About</a>
</div>

<script>

let data=[];

function normalizeText(str){
return str.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/’/g,"'")
.toLowerCase()
.trim();
}

/* ✅ SENİN ORİJİNAL FIXCODE - DOKUNULMADI */
function fixCode(team){
const map={
"Mexico":"mx","South Africa":"za","Korea Republic":"kr","Czechia":"cz",
"Canada":"ca","Bosnia-Herzegovina":"ba","USA":"us","Paraguay":"py",
"Qatar":"qa","Switzerland":"ch","Brazil":"br","Morocco":"ma",
"Haiti":"ht","Scotland":"gb","Australia":"au","Turkey":"tr",
"Germany":"de","Curaçao":"cw","Netherlands":"nl","Japan":"jp",
"Côte d'Ivoire":"ci","Ecuador":"ec","Sweden":"se","Tunisia":"tn",
"Spain":"es","Belgium":"be","Egypt":"eg","Saudi Arabia":"sa",
"Uruguay":"uy","Iran":"ir","New Zealand":"nz","France":"fr",
"Senegal":"sn","Iraq":"iq","Norway":"no","Argentina":"ar",
"Algeria":"dz","Austria":"at","Jordan":"jo","Portugal":"pt",
"Congo DR":"cd","England":"gb","Croatia":"hr","Ghana":"gh",
"Panama":"pa","Uzbekistan":"uz","Colombia":"co"
};
return map[team] || "";
}

fetch("https://raw.githubusercontent.com/SamilSen/matchaipro/main/predictions.csv")
.then(r=>r.text())
.then(t=>{

const rows=t.split(/\r?\n/).slice(1).filter(r=>r.trim());

data=rows.map(r=>{
const c=r.split(",");
return{
t1:c[0].trim(),
t2:c[1].trim(),
code1:fixCode(c[0].trim()),
code2:fixCode(c[1].trim()),
h:parseFloat(c[4]),
d:parseFloat(c[5]),
a:parseFloat(c[6])
};
});

document.getElementById("status").innerHTML="✅ Ready";

});

function flag(c){
return `<img class="flag" src="https://flagcdn.com/w40/${c}.png">`;
}

/* ✅ ORİJİNAL PREDICT - DOKUNULMADI */
function predict(){

const t1=document.getElementById("team1").value.trim();
const t2=document.getElementById("team2").value.trim();

const m=data.find(x =>
normalizeText(x.t1)===normalizeText(t1) &&
normalizeText(x.t2)===normalizeText(t2)
);

if(!m){
document.getElementById("result").innerHTML=
`<div class="card"><h2>❌ Match Not Found</h2></div>`;
return;
}

let pred="Draw";

if(m.h>m.d && m.h>m.a) pred=m.t1+" Win";
else if(m.a>m.h && m.a>m.d) pred=m.t2+" Win";

document.getElementById("result").innerHTML=`
<div class="card">

<h2>${flag(m.code1)} ${m.t1} VS ${m.t2} ${flag(m.code2)}</h2>

<h3>${pred}</h3>

<p>Home (${m.h}%)</p>
<div class="bar-bg"><div id="b1" class="bar home"></div></div>

<p>Draw (${m.d}%)</p>
<div class="bar-bg"><div id="b2" class="bar draw"></div></div>

<p>Away (${m.a}%)</p>
<div class="bar-bg"><div id="b3" class="bar away"></div></div>

</div>
`;

setTimeout(()=>{
document.getElementById("b1").style.width=m.h+"%";
document.getElementById("b2").style.width=m.d+"%";
document.getElementById("b3").style.width=m.a+"%";
},100);

}

</script>

</body>
</html>
