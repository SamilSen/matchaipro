<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;
outline:none;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.fixture-btn{
margin-top:10px;
padding:22px 55px;
font-size:30px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#2563eb,#3b82f6,#2563eb);
background-size:200% 200%;
box-shadow:0 0 18px rgba(37,99,235,.45);
display:inline-block;
text-decoration:none;
}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

#status{
margin-top:23px;
font-size:25px;
font-weight:800;
}

.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
border-radius:24px;
background:rgba(255,255,255,.62);
backdrop-filter:blur(12px);
box-shadow:0 18px 40px rgba(0,0,0,.16);
}

.bar-bg{
height:24px;
background:#e5e7eb;
border-radius:14px;
overflow:hidden;
margin-bottom:18px;
}

.bar{height:24px;width:0;border-radius:14px;transition:width 1.2s ease;}
.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

.footer{
margin-top:46px;
padding:26px;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:center;
gap:12px;
}

.footer a{
padding:16px 34px;
font-size:24px;
font-weight:900;
color:#7c3aed;
text-decoration:none;
border-radius:14px;
background:#fff;
border:2px solid #000;
}

.copy{
margin-top:20px;
padding-bottom:30px;
font-size:22px;
font-weight:900;
color:black;
}

/* 🔥 PAYWALL (MODERN UI) */
#paywall{
display:none;
position:fixed;
inset:0;
background:rgba(15,23,42,0.75);
backdrop-filter:blur(8px);
z-index:9999;
}

.paycard{
max-width:420px;
margin:80px auto;
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 25px 70px rgba(0,0,0,0.3);
text-align:center;
}

.paytitle{
font-size:26px;
font-weight:900;
margin-bottom:8px;
}

.paydesc{
color:#6b7280;
font-size:14px;
margin-bottom:20px;
}

.input{
width:100%;
padding:12px;
margin:6px 0 12px;
border-radius:10px;
border:1px solid #ddd;
}

.btn-dark{
width:100%;
padding:12px;
background:#111827;
color:white;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btn-purple{
width:100%;
padding:12px;
margin-top:10px;
background:#6366f1;
color:white;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btn-stripe{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(90deg,#6366f1,#a855f7);
color:white;
border:none;
border-radius:12px;
font-weight:900;
cursor:pointer;
box-shadow:0 10px 25px rgba(99,102,241,0.4);
}
</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">

<a href="fixture.html" class="fixture-btn">🏆 FIXTURE</a>

<br><br>

<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">

<br>

<button class="predict-btn" onclick="predict()">PREDICT</button>

</div>

<div id="status">Loading...</div>

<div id="result"></div>

<div class="footer">
<a href="legal.html">Legal Disclaimer</a>
<a href="price.html">Price Policy</a>
<a href="about.html">About & Contact</a>
</div>

<div class="copy">© 2026 MatchAI Pro. All Rights Reserved.</div>

<!-- 🔐 PAYWALL -->
<div id="paywall">

<div class="paycard">

<div class="paytitle">🔒 Premium Required</div>
<div class="paydesc">3 free predictions completed</div>

<input id="email" class="input" placeholder="Email">
<input id="password" class="input" type="password" placeholder="Password">

<button class="btn-dark" onclick="login()">Login</button>
<button class="btn-purple" onclick="signup()">Create Account</button>

<hr style="margin:20px 0;border:none;border-top:1px solid #eee;">

<div class="paydesc">Unlock unlimited predictions</div>

<button class="btn-stripe"
onclick="window.location.href='https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01'">
💳 Upgrade to Premium
</button>

</div>

</div>

<script>

let data = [];

const MAX_FREE_USES = 3;

function getUses(){
return parseInt(localStorage.getItem("uses") || "0");
}

function addUse(){
localStorage.setItem("uses", getUses() + 1);
}

function checkLimit(){
return getUses() >= MAX_FREE_USES;
}

function showPaywall(){
document.getElementById("paywall").style.display = "block";
}

function predict(){

if(checkLimit()){
showPaywall();
return;
}

addUse();

const t1 = document.getElementById("team1").value;
const t2 = document.getElementById("team2").value;

document.getElementById("result").innerHTML =
"<div class='card'><h2>" + t1 + " vs " + t2 + "</h2></div>";
}

/* dummy auth (sonra Firebase bağlanır) */
function login(){
alert("Login ready for Firebase integration");
}

function signup(){
alert("Signup ready for Firebase integration");
}

</script>

</body>
</html>
