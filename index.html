<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
line-height:1.1;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;
outline:none;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

#status{
margin-top:23px;
font-size:25px;
font-weight:800;
}

.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
border-radius:24px;
background:rgba(255,255,255,.62);
backdrop-filter:blur(12px);
box-shadow:0 18px 40px rgba(0,0,0,.16);
}

.card h2{font-size:45px;margin-bottom:13px;}

.card h3{
font-size:41px;
margin:18px 0 26px;
color:#7c3aed;
font-weight:900;
}

.gold{color:#f59e0b;font-weight:900;}

.flag{
width:52px;height:36px;
margin:0 10px;
border-radius:5px;
vertical-align:middle;
}

.card p{
font-size:29px;
font-weight:700;
margin:13px 0 10px;
}

.bar-bg{
height:24px;
background:#e5e7eb;
border-radius:14px;
overflow:hidden;
margin-bottom:18px;
}

.bar{
height:24px;
width:0;
border-radius:14px;
transition:width 1.2s ease;
}

.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

.footer{
margin-top:46px;
padding:26px;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:center;
gap:12px;
}

.footer a{
padding:16px 34px;
font-size:24px;
font-weight:900;
color:#7c3aed;
text-decoration:none;
border-radius:14px;
background:#fff;
border:2px solid #000;
}

.copy{
margin-top:20px;
padding-bottom:30px;
font-size:22px;
font-weight:900;
color:black;
}
</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">
<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">
<br>
<button class="predict-btn" onclick="predict()">PREDICT</button>
</div>

<div id="status">Loading...</div>
<div id="result"></div>

<div class="footer">
<a href="legal.html">Legal Disclaimer</a>
<a href="price.html">Price Policy</a>
<a href="about.html">About</a>
</div>

<div class="copy">
© 2026 ⚖️ MatchAI Pro. All Rights Reserved.
</div>

<script>

let data = [];

function clean(x){
return x.trim().toLowerCase();
}

fetch("https://raw.githubusercontent.com/MatchAIPro/matchai/main/predictions.csv")
.then(r => r.text())
.then(t => {

const rows = t.split(/\r?\n/).slice(1).filter(r => r.trim() !== "");

data = rows.map(r => {

const c = r.split(/[\t,]+/);   // 🔥 FIX (CSV + TSV uyumlu)

return {
t1: c[0],
t2: c[1],
code1: c[2].toLowerCase(),
code2: c[3].toLowerCase(),
h: +c[4],
d: +c[5],
a: +c[6]
};

});

document.getElementById("status").innerHTML = "✅ Ready";
});

function flag(code){
return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

function predict(){

const t1 = document.getElementById("team1").value;
const t2 = document.getElementById("team2").value;

const m = data.find(x =>
clean(x.t1) === clean(t1) &&
clean(x.t2) === clean(t2)
);

if(!m){
document.getElementById("result").innerHTML = "<h2>Match Not Found</h2>";
return;
}

let pred = "";
let w1 = "";
let w2 = "";

if(m.h > m.d && m.h > m.a){
pred = m.t1 + " Win";
w1 = "gold";
}
else if(m.a > m.h && m.a > m.d){
pred = m.t2 + " Win";
w2 = "gold";
}
else{
pred = "Draw";
}

document.getElementById("result").innerHTML = `
<div class="card">

<h2>
<span class="${w1}">
${flag(m.code1)} ${m.t1}
</span>
vs
<span class="${w2}">
${m.t2} ${flag(m.code2)}
</span>
</h2>

<h3>${pred}</h3>

<p>Home (${m.h}%)</p>
<div class="bar-bg"><div id="b1" class="bar home"></div></div>

<p>Draw (${m.d}%)</p>
<div class="bar-bg"><div id="b2" class="bar draw"></div></div>

<p>Away (${m.a}%)</p>
<div class="bar-bg"><div id="b3" class="bar away"></div></div>

</div>
`;

setTimeout(()=>{
document.getElementById("b1").style.width = m.h + "%";
document.getElementById("b2").style.width = m.d + "%";
document.getElementById("b3").style.width = m.a + "%";
},120);

}

</script>

</body>
</html>
