<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
}

.subtitle{
font-size:49px;
font-weight:800;
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
}

.predict-btn{
padding:31px 70px;
font-size:39px;
font-weight:900;
cursor:pointer;
}

.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
}

#authBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:white;
z-index:9999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN OVERLAY -->
<div id="authBox">
  <h2>MatchAI Login</h2>

  <input id="email" placeholder="Email" class="input-box">
  <input id="password" type="password" placeholder="Password" class="input-box">

  <button onclick="login()" class="predict-btn">Login</button>
  <button onclick="signup()" class="predict-btn">Sign Up</button>
</div>

<!-- 🌍 MAIN APP (SENİN KODUN) -->

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
</div>

<div class="form-box">

<input id="team1" class="input-box" placeholder="Home Team">
<input id="team2" class="input-box" placeholder="Away Team">

<br>

<button class="predict-btn" onclick="predict()">PREDICT</button>

</div>

<div id="result"></div>

<!-- 🔥 FIREBASE LOGIC -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* SIGN UP */
window.signup = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",res.user.uid),{
    email: email,
    paid: false
  });

  alert("Account created");
};

/* LOGIN */
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await signInWithEmailAndPassword(auth,email,pass);

  checkPremium(res.user.uid);
};

/* PREMIUM CHECK */
async function checkPremium(uid){

  const snap = await getDoc(doc(db,"users",uid));

  if(snap.exists() && snap.data().paid === true){

    document.getElementById("authBox").style.display="none";

  } else {

    alert("Not Premium → Stripe yönlendiriliyor");

    window.location.href =
    "https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";
  }
}

/* SENİN PREDICTION KODUN (KORUNDU) */
window.predict = function(){

  const t1 = document.getElementById("team1").value;
  const t2 = document.getElementById("team2").value;

  document.getElementById("result").innerHTML =
    "<div class='card'><h2>" + t1 + " vs " + t2 + "</h2></div>";
};

</script>

</body>
</html>
