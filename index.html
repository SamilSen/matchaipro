<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;
outline:none;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

#status{
margin-top:23px;
font-size:25px;
font-weight:800;
}

.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
border-radius:24px;
background:rgba(255,255,255,.62);
backdrop-filter:blur(12px);
box-shadow:0 18px 40px rgba(0,0,0,.16);
}

.bar-bg{
height:24px;
background:#e5e7eb;
border-radius:14px;
overflow:hidden;
margin-bottom:18px;
}

.bar{height:24px;width:0;border-radius:14px;transition:width 1.2s ease;}
.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

.footer{
margin-top:46px;
padding:26px;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:center;
gap:12px;
}

.footer a{
padding:16px 34px;
font-size:24px;
font-weight:900;
color:#7c3aed;
text-decoration:none;
border-radius:14px;
background:#fff;
border:2px solid #000;
}

.copy{
margin-top:20px;
padding-bottom:30px;
font-size:22px;
font-weight:900;
color:black;
}

.heartbeat-text{
animation:heartbeat 1.2s infinite;
display:inline-block;
}

@keyframes heartbeat{
0%{transform:scale(1)}
25%{transform:scale(1.1)}
50%{transform:scale(1)}
75%{transform:scale(1.15)}
100%{transform:scale(1)}
}

.flag{
width:40px;
height:28px;
border-radius:4px;
}
</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">
<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">
<br>
<button class="predict-btn" onclick="predict()">PREDICT</button>
</div>

<div id="status">Loading...</div>

<div id="result">
  <div class="card">
    ⚽ Ready For Prediction<br>
    <span class="heartbeat-text">Enter Teams Above</span>
    <p>Home (0%)</p>
    <p>Draw (0%)</p>
    <p>Away (0%)</p>
  </div>
</div>

<div class="footer">
<a href="legal.html">Legal Disclaimer</a>
<a href="price.html">Price Policy</a>
<a href="about.html">About & Contact</a>
</div>

<div class="copy">
© 2026 MatchAI Pro. All Rights Reserved.
</div>

<script>

let data = [];
let freeCount = localStorage.getItem("freeCount") || 0;
let paid = localStorage.getItem("paid") || "false";

/* =========================
   🔥 FIX: NORMALIZATION
========================= */
function normalizeTeam(t){
return t
.toLowerCase()
.replace(/\./g,"")
.replace(/’/g,"'")
.replace(/\s+/g," ")
.trim();
}

/* =========================
   🔥 FIX: COUNTRY CODES
========================= */
function fixCode(team){

const t = normalizeTeam(team);

const map = {
"mexico":"mx",
"south africa":"za",
"korea republic":"kr",
"south korea":"kr",
"czechia":"cz",
"usa":"us",
"united states":"us",
"brazil":"br",
"france":"fr",
"argentina":"ar",
"germany":"de",
"spain":"es",
"italy":"it",
"england":"gb",
"scotland":"gb",
"turkey":"tr",
"netherlands":"nl",
"portugal":"pt",
"japan":"jp",
"cote d'ivoire":"ci",
"côte d'ivoire":"ci",
"bosnia-herzegovina":"ba",
"bosnia herzegovina":"ba",
"czech republic":"cz"
};

return map[t] || "un";
}

/* =========================
   FLAG SAFE
========================= */
function flag(code){
if(!code || code === "un"){
return "🏳️";
}
return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

/* =========================
   DATA LOAD
========================= */
fetch("https://raw.githubusercontent.com/SamilSen/matchaipro/main/predictions.csv")
.then(r=>r.text())
.then(t=>{

const rows = t.split(/\r?\n/).slice(1).filter(r=>r.trim());

data = rows.map(r=>{
const c = r.split(",");

return {
t1:c[0].trim(),
t2:c[1].trim(),
code1:fixCode(c[0].trim()),
code2:fixCode(c[1].trim()),
h:parseFloat(c[4]),
d:parseFloat(c[5]),
a:parseFloat(c[6])
};
});

document.getElementById("status").innerHTML="✅ Ready";
});

/* =========================
   PAYWALL SYSTEM
========================= */
function predict(){

if(paid === "true"){
runPrediction();
return;
}

if(freeCount >= 3){
showPaywall();
return;
}

freeCount++;
localStorage.setItem("freeCount", freeCount);

runPrediction();
}

function showPaywall(){

document.getElementById("result").innerHTML = `
<div class="card">

<h2>🔒 Limit Reached</h2>

<p>You used your 3 free predictions</p>

<button onclick="buyPro()" style="
padding:20px 40px;
font-size:24px;
background:#3b82f6;
color:white;
border:none;
border-radius:12px;
margin:10px;
cursor:pointer;">
🔥 Unlock Pro - $4.99
</button>

</div>
`;
}

function buyPro(){
window.location.href = "https://buy.stripe.com/6oU4gAfzd5ps2KjdbA6Zy01";
}

/* =========================
   PREDICTION
========================= */
function runPrediction(){

const t1 = document.getElementById("team1").value.trim();
const t2 = document.getElementById("team2").value.trim();

const m = data.find(x =>
normalizeTeam(x.t1) === normalizeTeam(t1) &&
normalizeTeam(x.t2) === normalizeTeam(t2)
);

if(!m){
document.getElementById("result").innerHTML=
"<div class='card'>❌ Match Not Found</div>";
return;
}

let pred="";

if(m.h>m.d && m.h>m.a) pred=m.t1+" Win";
else if(m.a>m.h && m.a>m.d) pred=m.t2+" Win";
else pred="Draw";

document.getElementById("result").innerHTML=`
<div class="card">

<h2>
${flag(m.code1)} ${m.t1} VS ${flag(m.code2)} ${m.t2}
</h2>

<h3>${pred}</h3>

<p>Home ${m.h}%</p>
<p>Draw ${m.d}%</p>
<p>Away ${m.a}%</p>

</div>
`;
}

</script>

</body>
</html>
