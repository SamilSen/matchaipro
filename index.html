<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
/* CSS AYNI - DOKUNMADIM */
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.trust{
margin-top:16px;
font-size:26px;
font-weight:700;
color:#374151;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.form-box{margin-top:36px}

.input-box{
width:340px;
padding:28px;
margin:13px;
font-size:32px;
border-radius:14px;
border:2px solid #d1d5db;
outline:none;
}

#team1{background:#ecfdf5;border-color:#22c55e}
#team2{background:#eff6ff;border-color:#3b82f6}

.fixture-btn{
margin-top:10px;
padding:22px 55px;
font-size:30px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#2563eb,#3b82f6,#2563eb);
background-size:200% 200%;
box-shadow:0 0 18px rgba(37,99,235,.45);
display:inline-block;
text-decoration:none;
}

.predict-btn{
margin-top:29px;
padding:31px 70px;
font-size:39px;
font-weight:900;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
background-size:200% 200%;
box-shadow:0 0 18px rgba(225,29,72,.45);
}

#status{
margin-top:23px;
font-size:25px;
font-weight:800;
}

.card{
margin-top:36px;
display:inline-block;
width:616px;
padding:44px;
border-radius:24px;
background:rgba(255,255,255,.62);
backdrop-filter:blur(12px);
box-shadow:0 18px 40px rgba(0,0,0,.16);
}
</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">

<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
<div class="trust">📈 Trusted by 10,000+ users worldwide</div>
</div>

<div class="form-box">

<a href="fixture.html" class="fixture-btn">🏆 FIXTURE</a>

<!-- 🔥 LOGIN -->
<br>
<button onclick="login()" style="
margin-top:20px;
padding:18px 40px;
font-size:24px;
font-weight:900;
border:none;
border-radius:12px;
cursor:pointer;
background:#111827;
color:white;
">
🔐 Login with Google
</button>

<br><br>

<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">

<br>

<button class="predict-btn" onclick="predict()">PREDICT</button>

</div>

<div id="status">Ready</div>

<!-- 🔥 FIREBASE (GLOBAL FIX) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDm-tChOkLa0T26khkWVX_yWCa6cKaML7Q",
  authDomain: "matchaipro-accc8.firebaseapp.com",
  projectId: "matchaipro-accc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 GLOBAL YAP (KRİTİK FIX)
window.auth = auth;
window.GoogleAuthProvider = GoogleAuthProvider;
window.signInWithPopup = signInWithPopup;
</script>

<!-- 🔥 LOGIN FUNCTION -->
<script>
async function login(){
  try{
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    document.getElementById("status").innerHTML =
      "✅ Logged in: " + result.user.email;
  }catch(e){
    console.error(e);
    alert("Login error: " + e.message);
  }
}
</script>

</body>
</html>
