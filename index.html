<!DOCTYPE html>
<html>
<head>
<title>MatchAI Pro</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#ede9fe);
color:#111827;
}

.hero{padding:39px 26px 13px;}

.logo{
width:92.4%;
max-width:990px;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
margin-bottom:36px;
}

.title{
font-size:64px;
font-weight:900;
background:linear-gradient(90deg,#6d28d9,#a855f7,#ec4899,#6d28d9);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

.subtitle{
font-size:49px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899,#2563eb);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s ease infinite;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.input-box{
width:340px;
padding:22px;
margin:13px;
font-size:28px;
border-radius:14px;
border:2px solid #d1d5db;
}

.predict-btn{
padding:24px 60px;
font-size:32px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#e11d48,#f43f5e,#e11d48);
}

.card{
margin-top:36px;
display:inline-block;
width:600px;
padding:40px;
border-radius:24px;
background:rgba(255,255,255,.7);
backdrop-filter:blur(12px);
}

.flag{
width:48px;height:32px;
margin:0 8px;
border-radius:4px;
}

.bar-bg{
height:22px;
background:#e5e7eb;
border-radius:12px;
overflow:hidden;
margin-bottom:16px;
}

.bar{height:22px;width:0;transition:width 1s ease;}
.home{background:#22c55e;}
.draw{background:#f59e0b;}
.away{background:#ef4444;}

</style>
</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/MatchAIPro/matchai/main/image.png" class="logo">
<div class="title">World Cup 2026</div>
<div class="subtitle">AI Prediction Engine</div>
</div>

<input id="team1" class="input-box" placeholder="Home Team">
<input id="team2" class="input-box" placeholder="Away Team">
<br>
<button class="predict-btn" onclick="predict()">PREDICT</button>

<div id="status">Loading...</div>
<div id="result"></div>

<script>

let data = [];

// normalize (accent fix)
function normalize(t){
return t.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/’/g,"'")
.toLowerCase().trim();
}

// 🔥 FIXED ISO COUNTRY CODES (FLAG CDN COMPATIBLE)
function fixCode(team){
const map = {
"Mexico":"mx",
"South Africa":"za",
"Korea Republic":"kr",
"Czechia":"cz",
"Canada":"ca",
"Bosnia-Herzegovina":"ba",
"USA":"us",
"Paraguay":"py",
"Qatar":"qa",
"Switzerland":"ch",
"Brazil":"br",
"Morocco":"ma",
"Haiti":"ht",
"Scotland":"gb",
"Australia":"au",
"Turkey":"tr",
"Germany":"de",
"Curaçao":"cw",
"Netherlands":"nl",
"Japan":"jp",
"Côte d'Ivoire":"ci",
"Ecuador":"ec",
"Sweden":"se",
"Tunisia":"tn",
"Spain":"es",
"Belgium":"be",
"Egypt":"eg",
"Saudi Arabia":"sa",
"Uruguay":"uy",
"Iran":"ir",
"New Zealand":"nz",
"France":"fr",
"Senegal":"sn",
"Iraq":"iq",
"Norway":"no",
"Argentina":"ar",
"Algeria":"dz",
"Austria":"at",
"Jordan":"jo",
"Portugal":"pt",
"Congo DR":"cd",
"England":"gb",
"Croatia":"hr",
"Ghana":"gh",
"Panama":"pa",
"Uzbekistan":"uz",
"Colombia":"co"
};
return map[team] || "";
}

fetch("https://raw.githubusercontent.com/MatchAIPro/matchai/main/predictions.csv")
.then(r=>r.text())
.then(t=>{

const rows = t.split(/\r?\n/).slice(1).filter(r=>r.trim());

data = rows.map(r=>{
const c = r.split(",");

return {
t1:c[0].trim(),
t2:c[1].trim(),
c1:fixCode(c[0].trim()),
c2:fixCode(c[1].trim()),
h:parseFloat(c[4]),
d:parseFloat(c[5]),
a:parseFloat(c[6])
};
});

document.getElementById("status").innerHTML="✅ Ready";
});

function flag(code){
return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

function predict(){

const t1 = document.getElementById("team1").value;
const t2 = document.getElementById("team2").value;

const m = data.find(x =>
normalize(x.t1) === normalize(t1) &&
normalize(x.t2) === normalize(t2)
);

if(!m){
document.getElementById("result").innerHTML="❌ Match Not Found";
return;
}

let pred = "Draw";
if(m.h>m.d && m.h>m.a) pred = m.t1+" Win";
if(m.a>m.h && m.a>m.d) pred = m.t2+" Win";

document.getElementById("result").innerHTML=`
<div class="card">

<h2>
${flag(m.c1)} ${m.t1}
vs
${m.t2} ${flag(m.c2)}
</h2>

<h3>${pred}</h3>

<p>Home ${m.h}%</p>
<div class="bar-bg"><div id="b1" class="bar home"></div></div>

<p>Draw ${m.d}%</p>
<div class="bar-bg"><div id="b2" class="bar draw"></div></div>

<p>Away ${m.a}%</p>
<div class="bar-bg"><div id="b3" class="bar away"></div></div>

</div>
`;

setTimeout(()=>{
document.getElementById("b1").style.width=m.h+"%";
document.getElementById("b2").style.width=m.d+"%";
document.getElementById("b3").style.width=m.a+"%";
},100);
}

</script>

</body>
</html>
